<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Biochemistry Arena</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:#00ffff;
  touch-action:none;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  font-size:clamp(12px,2vw,16px);
  z-index:10;
}

#pauseScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  font-size:clamp(24px,6vw,40px);
  color:#00ffff;
  z-index:20;
}

.atom{
  position:absolute;
  width:clamp(40px,6vw,60px);
  height:clamp(40px,6vw,60px);
  border-radius:50%;
  border:2px solid #00ffff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  text-align:center;
}

#paddle{
  position:absolute;
  width:clamp(180px,40vw,300px);
  height:clamp(24px,4vw,32px);
  bottom:20px;
  background:linear-gradient(90deg,#00ffff,#00ff99);
  border-radius:12px;
  text-align:center;
  font-weight:bold;
  color:black;
  box-shadow:0 0 20px #00ffff;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div id="ui">
Level: <span id="level">1</span> |
Time: <span id="time">0</span> |
High Score: <span id="high">0</span> |
Press P to Pause
</div>

<div id="pauseScreen">PAUSED</div>
<div id="paddle">⚡ BIOCHEMISTRY ⚡</div>

<script>

let atom;
let x,y,vx,vy;

let ballSpeed=280;
let paddleSpeed=900;

let level=1;
let maxLevel=100;

let paddle=document.getElementById("paddle");
let paddleWidth;
let paddleX;

let moveLeft=false;
let moveRight=false;

let lastTime=performance.now();
let startTime=performance.now();

let paused=false;
let gameOver=false;

let highScore=localStorage.getItem("highScore")||0;
document.getElementById("high").innerText=highScore;

function initPaddle(){
  paddleWidth=paddle.offsetWidth;
  paddleX=window.innerWidth/2 - paddleWidth/2;
  paddle.style.left=paddleX+"px";
}

function createAtom(){
  atom=document.createElement("div");
  atom.className="atom";
  atom.innerText="RESIDENT";
  document.body.appendChild(atom);

  x=window.innerWidth/2;
  y=120;

  const angle=(Math.random()*Math.PI/3)+(Math.PI/6);
  const dir=Math.random()>0.5?1:-1;

  vx=ballSpeed*Math.cos(angle)*dir;
  vy=-ballSpeed*Math.sin(angle);
}

function update(now){

  if(gameOver) return;
  requestAnimationFrame(update);

  const delta=(now-lastTime)/1000;
  lastTime=now;
  if(paused) return;

  /* Keyboard movement */
  if(moveLeft) paddleX -= paddleSpeed*delta;
  if(moveRight) paddleX += paddleSpeed*delta;

  paddleX=Math.max(0,Math.min(window.innerWidth-paddleWidth,paddleX));
  paddle.style.left=paddleX+"px";

  x+=vx*delta;
  y+=vy*delta;

  let ballSize=atom.offsetWidth;

  if(x<=0){x=0;vx*=-1;}
  if(x+ballSize>=window.innerWidth){
    x=window.innerWidth-ballSize;vx*=-1;
  }
  if(y<=0){y=0;vy*=-1;}

  let paddleTop=window.innerHeight - paddle.offsetHeight - 20;

  if(
    y+ballSize>=paddleTop &&
    x+ballSize>paddleX &&
    x<paddleX+paddleWidth &&
    vy>0
  ){
    y=paddleTop-ballSize;

    let hit=(x+ballSize/2-paddleX)/paddleWidth;
    let angle=(hit-0.5)*Math.PI/2;

    vx=ballSpeed*Math.sin(angle);
    vy=-ballSpeed*Math.cos(angle);
  }

  if(y>window.innerHeight){
    gameOver=true;
    alert("Game Over at Level "+level);
    if(level>highScore){
      localStorage.setItem("highScore",level);
    }
    location.reload();
  }

  atom.style.left=x+"px";
  atom.style.top=y+"px";
}

function progressiveDifficulty(){
  let elapsed=(performance.now()-startTime)/1000;
  document.getElementById("time").innerText=Math.floor(elapsed);

  let newLevel=Math.floor(elapsed/6)+1;
  if(newLevel>maxLevel) newLevel=maxLevel;

  if(newLevel>level){
    level=newLevel;
    document.getElementById("level").innerText=level;
    ballSpeed+=25;

    const mag=Math.sqrt(vx*vx+vy*vy);
    vx=(vx/mag)*ballSpeed;
    vy=(vy/mag)*ballSpeed;
  }
}

/* KEYBOARD */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") moveLeft=true;
  if(e.key==="ArrowRight") moveRight=true;
  if(e.key==="p"||e.key==="P"){
    paused=!paused;
    document.getElementById("pauseScreen").style.display=paused?"flex":"none";
  }
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") moveLeft=false;
  if(e.key==="ArrowRight") moveRight=false;
});

/* MOUSE */
document.addEventListener("mousemove",e=>{
  paddleWidth=paddle.offsetWidth;
  paddleX=e.clientX - paddleWidth/2;
});

/* TOUCH */
document.addEventListener("touchmove",e=>{
  let touch=e.touches[0];
  paddleWidth=paddle.offsetWidth;
  paddleX=touch.clientX - paddleWidth/2;
});

/* RESIZE SAFE */
window.addEventListener("resize",initPaddle);

initPaddle();
createAtom();
setInterval(progressiveDifficulty,1000);
requestAnimationFrame(update);

</script>
</body>
</html>
